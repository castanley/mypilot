# MyPilot Stack — Podman-first (Docker compatible).
#   podman compose up -d --build      (or: docker compose up -d --build)
#
# Only Caddy (80/443) and the MinIO console (9001) are published. Postgres, Redis,
# the API, and the Web app stay on the internal network and are reached through Caddy.
name: mypilot

services:
  mypilot-db:
    image: docker.io/library/postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - mypilot_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  mypilot-redis:
    image: docker.io/library/redis:7
    restart: unless-stopped
    command: ["redis-server", "--save", "60", "1", "--appendonly", "no"]
    volumes:
      - mypilot_redis:/data

  mypilot-object-storage:
    image: quay.io/minio/minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - mypilot_minio:/data
    ports:
      # MinIO web console — bound to loopback only. Reach it via an SSH tunnel
      # (`ssh -L 9001:localhost:9001 host`); never expose the admin console publicly.
      - "127.0.0.1:9001:9001"

  mypilot-api:
    build:
      context: .
      dockerfile: mypilot-stack/api/Dockerfile
    image: localhost/mypilot-api:dev
    restart: unless-stopped
    environment:
      MYPILOT_ENV: production
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@mypilot-db:5432/${POSTGRES_DB}
      REDIS_URL: redis://mypilot-redis:6379/0
      # Object storage = where drive video + route/log artifacts land. Defaults to the bundled
      # MinIO; override these to point at an external S3 / a different volume (see .env.example).
      S3_ENDPOINT: ${S3_ENDPOINT:-http://mypilot-object-storage:9000}
      S3_BUCKET: ${S3_BUCKET}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-${MINIO_ROOT_USER}}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-${MINIO_ROOT_PASSWORD}}
      API_SECRET_KEY: ${API_SECRET_KEY}
      COOKIE_SECURE: ${COOKIE_SECURE}
      SITE_ADDRESS: ${MYPILOT_SITE_ADDRESS}
    depends_on:
      - mypilot-db
      - mypilot-redis
      - mypilot-object-storage

  mypilot-web:
    build:
      context: .
      dockerfile: mypilot-web/Dockerfile
    image: localhost/mypilot-web:dev
    restart: unless-stopped
    environment:
      NODE_ENV: production
      INTERNAL_API_URL: http://mypilot-api:8000
      PUBLIC_API_BASE: ${PUBLIC_API_BASE}
      # Behind Caddy: trust forwarded proto/host for correct origin handling.
      PROTOCOL_HEADER: x-forwarded-proto
      HOST_HEADER: x-forwarded-host
      # The /docs wiki renders these markdown files (single source of truth).
      MYPILOT_DOCS_DIR: /app/docs
      # Source repo for the docs wiki's "../" links (e.g. ../mypilot-mici/). Override per fork in
      # .env; defaults to this deployment's repo.
      MYPILOT_SOURCE_URL: ${MYPILOT_SOURCE_URL:-https://github.com/castanley/mypilot}
    volumes:
      # Live-edit docs without a rebuild; the image also bakes in a copy as a fallback.
      # Shared SELinux label (z, not Z): read-only docs editable on the host stay readable by the
      # container across recreates — a private label (Z) breaks when the container's MCS category
      # changes.
      - ./docs:/app/docs:ro,z
    depends_on:
      - mypilot-api

  mypilot-caddy:
    image: docker.io/library/caddy:2
    restart: unless-stopped
    environment:
      # ":80" serves HTTP for any host (LAN default); set to a domain for automatic TLS.
      MYPILOT_CADDY_SITE: ${MYPILOT_CADDY_SITE:-:80}
    ports:
      - "${MYPILOT_HTTP_PORT:-80}:80"
      - "${MYPILOT_HTTPS_PORT:-443}:443"
    volumes:
      - ./deploy/caddy/Caddyfile:/etc/caddy/Caddyfile:ro,Z
      - mypilot_caddy_data:/data
      - mypilot_caddy_config:/config
    depends_on:
      - mypilot-web
      - mypilot-api

  # Optional: a simulated comma device. Start with:  podman compose --profile sim up -d
  mypilot-sim-device:
    build:
      context: .
      dockerfile: mypilot-agent/Dockerfile
    image: localhost/mypilot-agent:dev
    profiles: ["sim"]
    environment:
      MYPILOT_STACK_URL: http://mypilot-api:8000
      MYPILOT_AGENT_DATA_DIR: /data
      MYPILOT_SIM_ALIAS: "Simulated comma three"
    volumes:
      - mypilot_sim_device:/data
    depends_on:
      - mypilot-api

volumes:
  mypilot_db:
  mypilot_redis:
  mypilot_minio:
  mypilot_caddy_data:
  mypilot_caddy_config:
  mypilot_sim_device:
